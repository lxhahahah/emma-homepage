<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emma Portfolio</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family:"Helvetica Neue", sans-serif;
      background:#fffafc;
      color:#444;
    }

    nav{
      position:fixed;
      top:0;
      width:100%;
      background:#ffffffcc;
      backdrop-filter:blur(10px);
      display:flex;
      justify-content:space-between;
      padding:15px 30px;
      border-bottom:1px solid #eee;
    }

    nav a{color:#555;margin-left:20px;text-decoration:none}

    .container{
      max-width:800px;
      margin:80px auto;
      padding:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:20px;
      box-shadow:0 4px 15px rgba(0,0,0,0.05);
      margin-bottom:20px;
      transition:0.3s;
    }

    .card:hover{transform:translateY(-4px)}

    h2{margin-bottom:10px}

    textarea,input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:12px;
      border:1px solid #eee;
      background:#fafafa;
    }

    button{
      margin-top:10px;
      padding:10px 14px;
      border:none;
      border-radius:12px;
      background:#ff9bb3;
      color:white;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      transform:scale(1.05);
      background:#ff7fa0;
    }

    img{
      max-width:100%;
      border-radius:12px;
      margin-top:10px;
    }

    small{opacity:0.6;font-size:12px}

  </style>
</head>

<body>

<nav>
  <div>🌸 Emma</div>
  <div>
    <a href="#profile">Profile</a>
    <a href="#diary">Diary</a>
  </div>
</nav>

<div class="container">

  <!-- PROFILE -->
  <section id="profile" class="card">
    <h2>👤 About Me</h2>
    <p>Hi, I'm Emma ✨</p>
    <p>Living in Germany 🇩🇪</p>
    <p>Learning German & building my life 🌱</p>
  </section>

  <!-- DIARY -->
  <section id="diary" class="card">
    <h2>📖 My Diary</h2>

    <input id="titleInput" placeholder="Title (optional)">
    <textarea id="diaryInput" placeholder="Write something cute..."></textarea>

    <!-- 图片上传 -->
    <input type="file" id="imageInput" accept="image/*">

    <button onclick="addEntry()">Add</button>

    <div id="entries"></div>
  </section>

</div>

<script>

let entries = JSON.parse(localStorage.getItem('diaryV3')) || [];

renderAll();

function generateId(){
  return Date.now();
}

function addEntry(){
  const title = document.getElementById('titleInput').value;
  const text = document.getElementById('diaryInput').value;
  const file = document.getElementById('imageInput').files[0];

  if(text.trim()==='' && !file) return;

  const reader = new FileReader();

  reader.onload = function(){
    const entry = {
      id: generateId(),
      title,
      text,
      image: reader.result || null,
      time: new Date().toLocaleString()
    };

    entries.unshift(entry);
    save();
    renderAll();
  }

  if(file){
    reader.readAsDataURL(file);
  } else {
    reader.onload();
  }

  document.getElementById('titleInput').value='';
  document.getElementById('diaryInput').value='';
  document.getElementById('imageInput').value='';
}

function renderAll(){
  const container = document.getElementById('entries');
  container.innerHTML='';

  entries.forEach(entry=>{
    const div = document.createElement('div');
    div.className='card';

    div.innerHTML = `
      <h3 contenteditable="true" onblur="editTitle(${entry.id}, this.innerText)">${entry.title || 'Untitled'}</h3>
      <p contenteditable="true" onblur="editText(${entry.id}, this.innerText)">${entry.text || ''}</p>
      ${entry.image ? `<img src="${entry.image}">` : ''}
      <small>🕒 ${entry.time}</small>

      <button onclick="deleteEntry(${entry.id})">Delete</button>
    `;

    container.appendChild(div);
  });
}

function save(){
  localStorage.setItem('diaryV3', JSON.stringify(entries));
}

function deleteEntry(id){
  entries = entries.filter(e=>e.id!==id);
  save();
  renderAll();
}

function editText(id, newText){
  const entry = entries.find(e=>e.id===id);
  entry.text = newText;
  save();
}

function editTitle(id, newTitle){
  const entry = entries.find(e=>e.id===id);
  entry.title = newTitle;
  save();
}

</script>

</body>
</html>
