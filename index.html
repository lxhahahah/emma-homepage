<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emma Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family:'Quicksand', sans-serif;
      background:#fffafc;
      color:#444;
    }

    nav{
      position:fixed;
      top:0;
      width:100%;
      background:#ffffffcc;
      backdrop-filter:blur(10px);
      display:flex;
      justify-content:space-between;
      padding:15px 30px;
      border-bottom:1px solid #eee;
      z-index:1000;
    }

    nav a{color:#555;margin-left:20px;text-decoration:none}

    .container{
      max-width:1100px;
      margin:80px auto;
      padding:20px;
      display:grid;
      grid-template-columns:1fr 2fr;
      gap:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:20px;
      box-shadow:0 4px 15px rgba(0,0,0,0.05);
      margin-bottom:20px;
      transition:0.3s;
    }

    .card:hover{transform:translateY(-4px)}

    h2{margin-bottom:10px}

    textarea,input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:12px;
      border:1px solid #eee;
      background:#fafafa;
    }

    button{
      margin-top:10px;
      padding:10px 14px;
      border:none;
      border-radius:12px;
      background:#ff9bb3;
      color:white;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      transform:scale(1.05);
      background:#ff7fa0;
    }

    img{
      max-width:100%;
      border-radius:12px;
      margin-top:10px;
    }

    small{opacity:0.6;font-size:12px}

    .left, .right{display:flex;flex-direction:column}

    @media (max-width:768px){
      .container{grid-template-columns:1fr}
    }

  </style>
</head>

<body>

<nav>
  <div>🌸 Emma</div>
  <div>
    <a href="#">Home</a>
  </div>
</nav>

<div class="container">

  <!-- LEFT COLUMN -->
  <div class="left">

    <div class="card">
      <h2>👤 About Me</h2>
      <p>Hi, I'm Emma ✨</p>
      <p>Living in Germany 🇩🇪</p>
    </div>

    <div class="card">
      <h2>🚀 What I'm Doing</h2>
      <p>📚 Learning German (B1 → B2)</p>
      <p>🎯 Preparing for exams</p>
    </div>

    <div class="card">
      <h2>💖 My Interests</h2>
      <p>🎨 Painting</p>
      <p>🧘‍♀️ Yoga / Pilates</p>
      <p>☕ Coffee & Latte Art</p>
    </div>

    <div class="card">
      <h2>📬 Contact</h2>
      <p>Email: your@email.com</p>
      <p>Instagram: @yourname</p>
    </div>

  </div>

  <!-- RIGHT COLUMN -->
  <div class="right">

    <div class="card">
      <h2>📖 My Diary</h2>

      <input id="titleInput" placeholder="Title">
      <textarea id="diaryInput" placeholder="Write something..."></textarea>
      <input type="file" id="imageInput" accept="image/*">

      <button onclick="addEntry()">Add</button>

      <div id="entries"></div>
    </div>

  </div>

</div>

<script>

let entries = JSON.parse(localStorage.getItem('diaryV3')) || [];

renderAll();

function generateId(){
  return Date.now();
}

function addEntry(){
  const title = document.getElementById('titleInput').value;
  const text = document.getElementById('diaryInput').value;
  const fileInput = document.getElementById('imageInput');
  const file = fileInput.files[0];

  if(text.trim()==='' && !file) return;

  const reader = new FileReader();

  reader.onload = function(){
    const entry = {
      id: generateId(),
      title,
      text,
      image: reader.result || null,
      time: new Date().toLocaleString()
    };

    entries.unshift(entry);
    save();
    renderAll();
  }

  if(file){
    reader.readAsDataURL(file);
  } else {
    reader.onload();
  }

  document.getElementById('titleInput').value='';
  document.getElementById('diaryInput').value='';
  fileInput.value='';
}

function renderAll(){
  const container = document.getElementById('entries');
  container.innerHTML='';

  entries.forEach(entry=>{
    const div = document.createElement('div');
    div.className='card';

    div.innerHTML = `
      <h3 contenteditable="true" onblur="editTitle(${entry.id}, this.innerText)">${entry.title || 'Untitled'}</h3>
      <p contenteditable="true" onblur="editText(${entry.id}, this.innerText)">${entry.text || ''}</p>
      ${entry.image ? `<img src="${entry.image}">` : ''}
      <small>🕒 ${entry.time}</small>

      <button onclick="deleteEntry(${entry.id})">Delete</button>
    `;

    container.appendChild(div);
  });
}

function save(){
  localStorage.setItem('diaryV3', JSON.stringify(entries));
}

function deleteEntry(id){
  entries = entries.filter(e=>e.id!==id);
  save();
  renderAll();
}

function editText(id, newText){
  const entry = entries.find(e=>e.id===id);
  entry.text = newText;
  save();
}

function editTitle(id, newTitle){
  const entry = entries.find(e=>e.id===id);
  entry.title = newTitle;
  save();
}

</script>

</body>
</html>
