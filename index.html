<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Emma's Space 🌷</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f6f7fb;
    }

    .container {
      display: flex;
      max-width: 1000px;
      margin: 40px auto;
      gap: 20px;
    }

    .left {
      width: 35%;
      background: white;
      padding: 20px;
      border-radius: 15px;
    }

    .right {
      width: 65%;
      background: white;
      padding: 20px;
      border-radius: 15px;
    }

    h2 {
      margin-top: 0;
    }

    textarea {
      width: 100%;
      height: 120px;
      border-radius: 10px;
      border: 1px solid #ddd;
      padding: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ff8fab;
      color: white;
      cursor: pointer;
    }

    .diary-item {
      margin-top: 15px;
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    small {
      color: gray;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- 左栏 -->
  <div class="left">
    <h2>👩 Emma</h2>
    <p>Hi, I'm Emma 🌷</p>

    <h3>✨ What I'm doing</h3>
    <p>Learning German 🇩🇪 & preparing for exams</p>

    <h3>🎨 My Interests</h3>
    <p>Painting, Yoga, Coffee ☕</p>

    <h3>📬 Contact</h3>
    <p>Email: your@email.com</p>
  </div>

  <!-- 右栏 -->
  <div class="right">
    <h2>📔 My Diary</h2>

    <textarea id="diary" placeholder="写点今天的内容..."></textarea>
    <button onclick="saveDiary()">保存</button>

    <div id="output"></div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, query, orderBy } 
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ❗换成你的
  const firebaseConfig = {
  apiKey: "AIzaSyAWZ0RbDjd6ZKPPVIcmbYYQbAGgqIddC9o",
  authDomain: "emma-home-debc4.firebaseapp.com",
  projectId: "emma-home-debc4",
  storageBucket: "emma-home-debc4.firebasestorage.app",
  messagingSenderId: "136720026127",
  appId: "1:136720026127:web:aa51fc64d6d023569a317a",
  measurementId: "G-VYSJV2RGJN"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 保存
  async function saveDiary() {
    const content = document.getElementById("diary").value;

    if (!content.trim()) {
      alert("不能是空内容");
      return;
    }

    await addDoc(collection(db, "diaries"), {
      text: content,
      time: new Date()
    });

    document.getElementById("diary").value = "";
    loadDiary();
  }

  // 读取
  async function loadDiary() {
    const q = query(collection(db, "diaries"), orderBy("time", "desc"));
    const snapshot = await getDocs(q);

    let html = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      html += `
        <div class="diary-item">
          <div>${data.text}</div>
          <small>${new Date(data.time.seconds * 1000).toLocaleString()}</small>
        </div>
      `;
    });

    document.getElementById("output").innerHTML = html;
  }

  window.saveDiary = saveDiary;
  window.onload = loadDiary;
</script>

</body>
</html>
