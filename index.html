<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emma Portfolio</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family:Arial;
      background:#f5f5f5;
      color:#333;
    }

    nav{
      position:fixed;
      top:0;
      width:100%;
      background:#111;
      color:#fff;
      display:flex;
      justify-content:space-between;
      padding:15px 30px;
      z-index:1000;
    }

    nav a{color:#fff;margin-left:20px;text-decoration:none}

    .container{
      max-width:1000px;
      margin:80px auto;
      padding:20px;
    }

    .card{
      background:#fff;
      padding:20px;
      border-radius:16px;
      box-shadow:0 8px 20px rgba(0,0,0,0.1);
      margin-bottom:20px;
      transition:0.3s;
    }

    .card:hover{transform:translateY(-5px)}

    textarea,input{
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button{
      margin-top:10px;
      padding:8px 12px;
      border:none;
      border-radius:8px;
      background:#4caf50;
      color:white;
      cursor:pointer;
    }

    .actions button{
      margin-right:10px;
      background:#2196f3;
    }

    small{opacity:0.6;font-size:12px}

  </style>
</head>

<body>

<nav>
  <div><strong>Emma</strong></div>
  <div>
    <a href="#profile">Profile</a>
    <a href="#diary">Diary</a>
  </div>
</nav>

<div class="container">

  <!-- PROFILE -->
  <section id="profile" class="card">
    <h2>👤 About Me</h2>
    <p><strong>Name:</strong> Emma Liu</p>
    <p><strong>Location:</strong> Germany</p>
    <p><strong>Goal:</strong> Pass telc B2 & apply for Master</p>
    <p><strong>Focus:</strong> German Learning & Self Growth</p>
  </section>

  <!-- DIARY SYSTEM V3 -->
  <section id="diary" class="card">
    <h2>📖 Diary System v3</h2>

    <input id="titleInput" placeholder="Title (optional)">
    <textarea id="diaryInput" placeholder="Write something..."></textarea>

    <button onclick="addEntry()">Add</button>

    <div id="entries"></div>
  </section>

</div>

<script>

let entries = JSON.parse(localStorage.getItem('diaryV3')) || [];

// 初始化
renderAll();

function generateId(){
  return Date.now();
}

function addEntry(){
  const title = document.getElementById('titleInput').value;
  const text = document.getElementById('diaryInput').value;

  if(text.trim()==='') return;

  const entry = {
    id: generateId(),
    title,
    text,
    time: new Date().toLocaleString()
  };

  entries.unshift(entry);
  save();
  renderAll();

  document.getElementById('titleInput').value='';
  document.getElementById('diaryInput').value='';
}

function renderAll(){
  const container = document.getElementById('entries');
  container.innerHTML='';

  entries.forEach(entry=>{
    const div = document.createElement('div');
    div.className='card';

    div.innerHTML = `
      <h3 contenteditable="true" onblur="editTitle(${entry.id}, this.innerText)">${entry.title || 'Untitled'}</h3>
      <p contenteditable="true" onblur="editText(${entry.id}, this.innerText)">${entry.text}</p>
      <small>${entry.time}</small>

      <div class="actions">
        <button onclick="deleteEntry(${entry.id})">Delete</button>
        <button onclick="shareEntry(${entry.id})">Share</button>
      </div>
    `;

    container.appendChild(div);
  });
}

function save(){
  localStorage.setItem('diaryV3', JSON.stringify(entries));
}

function deleteEntry(id){
  entries = entries.filter(e=>e.id!==id);
  save();
  renderAll();
}

function editText(id, newText){
  const entry = entries.find(e=>e.id===id);
  entry.text = newText;
  save();
}

function editTitle(id, newTitle){
  const entry = entries.find(e=>e.id===id);
  entry.title = newTitle;
  save();
}

// 分享（核心升级）
function shareEntry(id){
  const entry = entries.find(e=>e.id===id);

  const data = encodeURIComponent(JSON.stringify(entry));

  const url = window.location.origin + window.location.pathname + '?data=' + data;

  navigator.clipboard.writeText(url);
  alert('Share link copied! Send to others.');
}

// 接收分享数据
window.onload = function(){
  const params = new URLSearchParams(window.location.search);
  const data = params.get('data');

  if(data){
    const entry = JSON.parse(decodeURIComponent(data));

    // 防止重复
    if(!entries.some(e=>e.id===entry.id)){
      entries.unshift(entry);
      save();
      renderAll();
    }
  }
}

</script>

</body>
</html>
