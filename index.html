<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Emma Diary ☁️</title>

  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: 40px auto;
      background: #f9f9f9;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ff8fab;
      color: white;
      cursor: pointer;
    }

    #output {
      margin-top: 30px;
      background: white;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h2>📔 Emma's Diary</h2>

  <textarea id="diary" placeholder="写点今天的内容..."></textarea>
  <button onclick="saveDiary()">保存到云端</button>

  <div id="output"></div>

  <script type="module">
    // 引入 Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, orderBy, query } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ❗❗❗这里换成你的 firebaseConfig
    const firebaseConfig = {
     apiKey: "AIzaSyAWZ0RbDjd6ZKPPVIcmbYYQbAGgqIddC9o",
     authDomain: "emma-home-debc4.firebaseapp.com",
     projectId: "emma-home-debc4",
     storageBucket: "emma-home-debc4.firebasestorage.app",
     messagingSenderId: "136720026127",
     appId: "1:136720026127:web:aa51fc64d6d023569a317a",
     measurementId: "G-VYSJV2RGJN"
    };

    // 初始化
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ✅ 保存日记
    async function saveDiary() {
      const content = document.getElementById("diary").value;

      if (!content.trim()) {
        alert("不能保存空内容！");
        return;
      }

      try {
        await addDoc(collection(db, "diaries"), {
          text: content,
          time: new Date()
        });

        alert("✅ 已保存！");
        document.getElementById("diary").value = "";

        loadDiary(); // 保存后刷新列表
      } catch (e) {
        alert("❌ 保存失败：" + e);
      }
    }

    // ✅ 读取日记（按时间排序）
    async function loadDiary() {
      const q = query(collection(db, "diaries"), orderBy("time", "desc"));
      const querySnapshot = await getDocs(q);

      let html = "";

      querySnapshot.forEach((doc) => {
        const data = doc.data();

        html += `
          <div style="margin-bottom:15px;">
            <div>${data.text}</div>
            <small>${new Date(data.time.seconds * 1000).toLocaleString()}</small>
            <hr>
          </div>
        `;
      });

      document.getElementById("output").innerHTML = html;
    }

    // ❗关键：让按钮能调用
    window.saveDiary = saveDiary;

    // 页面加载自动读取
    window.onload = loadDiary;

  </script>

</body>
</html>
